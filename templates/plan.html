{% extends "layout.html" %}

{% block content %}
<div class="dashboard-card page-transition" style="max-width: 1000px; margin: 0 auto; padding: 4rem;">
    <!-- Raw Markdown Content (Hidden) -->
    <div id="raw-content" style="display: none;">{{ content }}</div>
    
    <!-- Rendered content container -->
    <div id="markdown-viewer" class="markdown-body">
        <div style="text-align: center; padding: 4rem;">
            <div class="loader" style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent-purple); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 1rem; font-weight: 600; color: #888;">Parsing Roadmap...</p>
        </div>
    </div>

    <footer style="text-align: center; margin-top: 6rem; padding-top: 2rem; border-top: 1.5px solid #eee;">
        <p style="font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 0.2em;">Project Blueprints &copy; 2026</p>
    </footer>
</div>

<!-- Marked.js for high-performance markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- GitHub Markdown CSS for beautiful typography (optional, but we'll use custom styling) -->

<style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .markdown-body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.7;
        color: #24292e;
    }
    .markdown-body h1 {
        font-size: 3rem;
        font-weight: 800;
        border-bottom: 4px solid var(--accent-purple);
        padding-bottom: 1rem;
        margin-bottom: 2.5rem;
        letter-spacing: -2px;
    }
    .markdown-body h2 {
        font-size: 1.8rem;
        font-weight: 800;
        margin-top: 4rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 15px;
    }
    .markdown-body h3 {
        font-size: 1.3rem;
        font-weight: 700;
        margin-top: 2rem;
        color: var(--sidebar-navy);
    }
    .markdown-body p { margin-bottom: 1.2rem; font-weight: 500; font-size: 1.05rem; }
    .markdown-body code {
        background: #f6f8fa;
        padding: 0.2em 0.4em;
        border-radius: 6px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 85%;
    }
    .markdown-body pre {
        background: #f6f8fa;
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid #e1e4e8;
        overflow-x: auto;
        margin: 1.5rem 0;
    }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body blockquote {
        border-left: 4px solid var(--accent-purple);
        padding: 0.5rem 1.5rem;
        color: #6a737d;
        background: #f9f9f9;
        margin: 1.5rem 0;
        border-radius: 0 10px 10px 0;
    }
    .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 2rem 0;
    }
    .markdown-body th, .markdown-body td {
        padding: 1rem;
        border: 1px solid #dfe2e5;
        text-align: left;
    }
    .markdown-body th { background: #f6f8fa; font-weight: 700; }
    .markdown-body ul, .markdown-body ol { padding-left: 2rem; margin-bottom: 1.5rem; }
    .markdown-body li { margin-bottom: 0.5rem; font-weight: 500; }
    .markdown-body hr { border: none; border-top: 1px solid #eee; margin: 3rem 0; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const raw = document.getElementById('raw-content').textContent;
        const viewer = document.getElementById('markdown-viewer');
        
        // Configure marked
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true
        });

        // Render content
        viewer.innerHTML = marked.parse(raw);
        
        // Final polish for headers
        const h1 = viewer.querySelector('h1');
        if (h1) {
            h1.innerHTML = h1.innerText.replace('(LPR)', '<span style="color: var(--accent-purple)">(LPR)</span>');
        }
    });
</script>
{% endblock %}
